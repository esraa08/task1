<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEEE login</title>
</head>
<body>
    <h2 align="center"> wlcom to IEEE </h2>
    <br>
    <h2 align="center"> start login </h2>
    
    <form id="login" method="post" onsubmit="check(event)">
        <fieldset style="width: fit-content;">
            <label> username:</label>
             <input type="text" id="username" name="username" required >
             <br><br>
             <label> password:</label>
             <input type="password" id="password" name="password" required >
             <br><br>
             <button  type="submit" style="color: blue;"> submit</button>
            

        </fieldset>

    </form>
    <p id="message" align="center" style="color: red;"></p>
    <script src="web.js"></script>
</body>
</html>
